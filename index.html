<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>表千家 風炉 薄茶 運び点前（女点前）— 自分目線で学ぶ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --sumi:#0d0c0b; --panel:#16130f; --panel2:#1d1913; --line:#2a251d;
    --kinari:#e8e2d4; --dim:#8d8678; --faint:#5b554a;
    --urushi:#b3472f; --kin:#c9a24b;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:radial-gradient(130% 100% at 50% 0%, #1a1712 0%, var(--sumi) 70%);
    color:var(--kinari); font-family:"Zen Kaku Gothic New",sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
  }
  header{ padding:18px 26px 0; }
  .hrow{ display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; }
  .t{ font-family:"Shippori Mincho",serif; font-weight:700; font-size:clamp(18px,2.5vw,25px); letter-spacing:.13em; }
  .s{ color:var(--dim); font-size:12px; letter-spacing:.2em; }
  .tag{ margin-left:auto; color:var(--faint); font-size:11px; letter-spacing:.18em; border:1px solid var(--line); border-radius:999px; padding:5px 12px; }
  .phases{ display:flex; gap:8px; margin:14px 0 0; border-bottom:1px solid var(--line); }
  .ph{ font-family:"Shippori Mincho",serif; letter-spacing:.1em; font-size:13.5px; color:var(--faint);
       padding:10px 16px; border-bottom:2px solid transparent; cursor:pointer; background:none; border-top:none; border-left:none; border-right:none; }
  .ph:hover{ color:var(--kinari); }
  .ph.on{ color:var(--kin); border-bottom-color:var(--kin); }
  .ph .mini{ font-size:10px; color:var(--faint); letter-spacing:.14em; display:block; }
  .ph.soon{ cursor:default; }
  .ph.soon::after{ content:"準備中"; font-size:9px; color:var(--faint); margin-left:6px; border:1px solid var(--line); border-radius:6px; padding:1px 5px; }

  main{ flex:1; display:grid; grid-template-columns:210px 1fr; min-height:0; }
  @media (max-width:880px){ main{ grid-template-columns:1fr; } #rail{ display:none; } }

  #rail{ border-right:1px solid var(--line); overflow-y:auto; padding:8px 0 20px; }
  .rgroup{ font-family:"Shippori Mincho",serif; font-size:11px; letter-spacing:.16em; color:var(--kin);
    padding:14px 18px 6px; opacity:.85; }
  .rstep{ display:flex; gap:10px; align-items:baseline; padding:8px 18px; cursor:pointer;
          color:var(--dim); border-left:2px solid transparent; transition:.2s; font-size:12.5px; }
  .rstep:hover{ color:var(--kinari); background:#ffffff06; }
  .rstep.on{ color:var(--kin); border-left-color:var(--kin); background:#ffffff08; }
  .rstep .rn{ font-family:"Shippori Mincho",serif; width:1.8em; text-align:right; color:var(--faint); }
  .rstep.on .rn{ color:var(--kin); }

  #stage{ overflow-y:auto; padding:18px clamp(16px,3.2vw,40px); }
  .crumb{ color:var(--faint); font-size:11px; letter-spacing:.22em; }
  .head{ display:flex; align-items:baseline; gap:16px; margin:6px 0 14px; }
  .num{ font-family:"Shippori Mincho",serif; font-weight:700; font-size:clamp(34px,5vw,54px); color:var(--kin); line-height:.9; }
  .title{ font-family:"Shippori Mincho",serif; font-weight:600; font-size:clamp(17px,2.3vw,23px); letter-spacing:.06em; }

  .body{ display:grid; grid-template-columns:1.25fr 1fr; gap:26px; align-items:start; }
  @media (max-width:780px){ .body{ grid-template-columns:1fr; } }

  .scene{ position:relative; aspect-ratio:16/9; border-radius:14px; overflow:hidden;
    border:1px solid var(--line); background:#0c0a07; box-shadow:0 10px 30px #0006; }
  .scene img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .35s ease; }
  .scene img.show{ opacity:1; }
  .scene .vig{ position:absolute; inset:0; pointer-events:none; box-shadow:inset 0 0 60px #0006; }
  .scene .mo{ position:absolute; left:12px; bottom:11px; font-size:11px; letter-spacing:.06em;
    color:#f0dca0; background:#000a; border:1px solid #5a4e2e88; border-radius:8px; padding:4px 11px; }
  .scene .fno{ position:absolute; right:11px; top:10px; font-size:10px; letter-spacing:.1em;
    color:#cdbfae99; background:#0007; border-radius:6px; padding:2px 8px; }

  .text{ font-size:15px; line-height:2; color:#dcd6c8; }
  .text b{ color:var(--kin); font-weight:600; }
  .tools{ display:flex; flex-wrap:wrap; gap:7px; margin-top:14px; }
  .chip{ font-size:11px; letter-spacing:.04em; color:#cdbfae; border:1px solid var(--line); border-radius:999px; padding:4px 11px; background:#ffffff05; }
  .hint{ margin-top:14px; font-size:12.5px; color:var(--dim); border-left:2px solid var(--urushi); padding-left:12px; line-height:1.9; }
  .onna{ margin-top:12px; font-size:12.5px; color:#cdb6c4; border-left:2px solid #9b6b86; padding-left:12px; line-height:1.9; }
  .onna .vf{ color:var(--faint); }

  .controls{ display:flex; align-items:center; gap:14px; margin-top:22px; max-width:640px; }
  .nav{ background:transparent; color:var(--kinari); border:1px solid #5a5346; border-radius:999px;
        padding:10px 20px; font-size:13px; letter-spacing:.14em; font-family:"Shippori Mincho",serif; cursor:pointer; transition:.25s; }
  .nav:hover:not(:disabled){ border-color:var(--kin); color:var(--kin); }
  .nav:disabled{ opacity:.3; cursor:default; }
  .prog{ flex:1; height:2px; background:var(--line); border-radius:2px; overflow:hidden; }
  .prog i{ display:block; height:100%; background:var(--kin); transition:width .3s; }
  .count{ font-size:12px; color:var(--dim); letter-spacing:.08em; min-width:4.2em; text-align:right; }

  footer{ padding:13px 26px; border-top:1px solid var(--line); color:var(--faint); font-size:11px; line-height:1.8; }
</style>
</head>
<body>
<header>
  <div class="hrow">
    <span class="t">運び点前 ― 薄茶</span>
    <span class="s">表千家 ・ 風炉（夏点前）・ 女点前</span>
    <span class="tag">自分目線で学ぶ（実シーン・パーツ切り出し前）</span>
  </div>
  <nav class="phases" id="phases"></nav>
</header>

<main>
  <nav id="rail"></nav>
  <section id="stage">
    <div class="crumb" id="crumb"></div>
    <div class="head"><span class="num" id="num">0</span><span class="title" id="title"></span></div>
    <div class="body">
      <div>
        <div class="scene" id="scene">
          <img id="imgA" alt=""><img id="imgB" alt="">
          <div class="vig"></div>
          <div class="fno" id="fno"></div>
          <div class="mo" id="mo" style="display:none"></div>
        </div>
        <div class="tools" id="tools"></div>
      </div>
      <div>
        <div class="text" id="text"></div>
        <div class="hint" id="hint" style="display:none"></div>
        <div class="onna" id="onna" style="display:none"></div>
      </div>
    </div>
    <div class="controls">
      <button class="nav" id="prev">← 前へ</button>
      <button class="nav" id="next">次へ →</button>
      <div class="prog"><i id="bar"></i></div>
      <div class="count" id="count"></div>
    </div>
  </section>
</main>

<footer>
  シーンは表千家・女性・風炉 薄茶運び点前の実画像（パーツ切り出し前）。所作は学習用に要約・再構成。<b style="color:#cdb6c4">※要確認</b>＝画像からの再構成で、所作の細部を mame-sadou 等で裏取り予定。③仕舞いは画像待ち。
</footer>

<script src="./data/cleanse.js"></script>
<script src="./data/tate.js"></script>
<script>
/* フェーズ定義（③仕舞いは画像待ち） */
const PHASES = [
  { id:"cleanse", label:"① 清め", sub:"運び出し〜清め", data:window.SADO_CLEANSE },
  { id:"tate",    label:"② 点て", sub:"茶を点てる",     data:window.SADO_TATE },
  { id:"shimai",  label:"③ 仕舞い", sub:"片付け",        data:null }, // 画像待ち
];

/* 全手を連結 */
const ALL=[];
PHASES.forEach(p=>{ if(p.data) p.data.steps.forEach(s=> ALL.push({...s, phase:p.id, phaseLabel:p.label})); });
let cur=0, front='A';
const imgA=document.getElementById('imgA'), imgB=document.getElementById('imgB');
ALL.forEach(s=>{ if(s.img){ const i=new Image(); i.src=s.img; }});

/* フェーズタブ */
const phasesEl=document.getElementById('phases');
PHASES.forEach(p=>{
  const b=document.createElement('button'); b.className='ph'+(p.data?'':' soon'); b.dataset.id=p.id;
  b.innerHTML=`<span>${p.label}</span><span class="mini">${p.sub}</span>`;
  if(p.data) b.onclick=()=>{ const idx=ALL.findIndex(s=>s.phase===p.id); if(idx>=0) go(idx); };
  phasesEl.appendChild(b);
});

/* レール（フェーズ見出しつき） */
const rail=document.getElementById('rail'); let lastPhase=null;
ALL.forEach((s,i)=>{
  if(s.phase!==lastPhase){ const g=document.createElement('div'); g.className='rgroup'; g.textContent=s.phaseLabel; rail.appendChild(g); lastPhase=s.phase; }
  const d=document.createElement('div'); d.className='rstep'; d.dataset.i=i;
  d.innerHTML=`<span class="rn">${s.n}</span><span>${s.title}</span>`;
  d.onclick=()=>go(i); rail.appendChild(d);
});

function crossfade(src){
  const incoming = front==='A' ? imgB : imgA, outgoing = front==='A' ? imgA : imgB;
  const reveal=()=>{ incoming.classList.add('show'); outgoing.classList.remove('show'); };
  incoming.onload=reveal; incoming.src=src; if(incoming.complete) reveal();
  front = front==='A' ? 'B' : 'A';
}

function go(i){
  cur=Math.max(0,Math.min(ALL.length-1,i));
  const s=ALL[cur];
  document.getElementById('num').textContent=s.n;
  document.getElementById('title').textContent=s.title;
  document.getElementById('text').innerHTML=s.text;
  document.getElementById('crumb').textContent=s.phaseLabel+' ・ '+(s.te||'');
  document.getElementById('fno').textContent= s.img? 'img/'+s.img.replace(/.*\//,'') : '';
  if(s.img) crossfade(s.img);

  const mo=document.getElementById('mo');
  if(s.motion){ mo.style.display='block'; mo.textContent='⚙ '+s.motion; } else mo.style.display='none';

  const tools=document.getElementById('tools'); tools.innerHTML='';
  (s.tools||[]).forEach(t=>{ const c=document.createElement('span'); c.className='chip'; c.textContent=t; tools.appendChild(c); });

  const hint=document.getElementById('hint');
  if(s.hint){ hint.style.display='block'; hint.innerHTML='<b style="color:#c9a24b">急所</b>　'+s.hint; } else hint.style.display='none';

  const onna=document.getElementById('onna'); const parts=[];
  if(s.onna) parts.push('<b style="color:#c99bb4">女点前</b>　'+s.onna);
  if(s.men)  parts.push('<span class="vf">（男点前との差）'+s.men+'</span>');
  if(parts.length){ onna.style.display='block'; onna.innerHTML=parts.join('<br>')+(s.verify?' <span class="vf">※要確認</span>':''); }
  else if(s.verify){ onna.style.display='block'; onna.innerHTML='<span class="vf">※この手は画像から再構成・要確認</span>'; }
  else onna.style.display='none';

  document.getElementById('prev').disabled=cur===0;
  document.getElementById('next').disabled=cur===ALL.length-1;
  document.getElementById('count').textContent=`${cur+1} / ${ALL.length}`;
  document.getElementById('bar').style.width=(cur/(ALL.length-1)*100)+'%';
  document.querySelectorAll('.rstep').forEach((el,j)=>el.classList.toggle('on',j===cur));
  document.querySelectorAll('.ph').forEach(b=>b.classList.toggle('on', b.dataset.id===s.phase));
  const on=rail.querySelector('.rstep.on'); on&&on.scrollIntoView({block:'nearest'});
}
document.getElementById('prev').onclick=()=>go(cur-1);
document.getElementById('next').onclick=()=>go(cur+1);
addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') go(cur+1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') go(cur-1);
});
go(0);
</script>
</body>
</html>
