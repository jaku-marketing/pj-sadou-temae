<!DOCTYPE html>
<!--
  茶道お点前プレイヤー（右ドロワー・確定版／ブラッシュアップ4）
  ====================================================================
  ・実データ ./data/steps.js・実豆知識 ./data/tidbits.js・実画像 ./img/3〜53.png。
  ・修正/追加：
    ① 解説OFF時の画像はみ出し → フレームを画像比(1600:912)にJSでフィット（余白ゼロ・開閉どちらでも）
    ② 先生コメント(吹き出し)を撤去 → 「稽古の心得」に先生の顔写真(img/2.png)を追加
    ③ 概要文を表千家・風炉でブラッシュアップ（PROCEDURE.md準拠・要監修。手順詳細の細部は社中/教本で差あり）
    ④ 道具ピクトグラムを追加（各道具チップにアイコン）
  ====================================================================
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>茶道お点前 — お稽古プレイヤー（表千家・女性・夏）</title>
<style>
  :root{
    --rose:#c98a96; --rose-deep:#9c5d69; --rose-soft:#efe1e4;
    --bg:#f1ece9; --surface:#fffdfc; --surface-2:#f6efec;
    --ink:#2b2421; --ink-soft:#857873; --faint:#aa9c96; --accent:#7a5d54;
    --line:rgba(43,36,33,.12); --stage-bg:#e7ddd8; --chip-bg:#f1e6e6;
    --font:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
    --font-head:"Hiragino Mincho ProN","Noto Serif JP",serif;
    --radius:18px; --radius-s:11px;
    --shadow:0 18px 44px rgba(80,45,55,.18); --shadow-s:0 6px 16px rgba(80,45,55,.10);
    --dw:380px; --ease:cubic-bezier(.4,.14,.2,1); --ease-out:cubic-bezier(.16,.84,.34,1);
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{ margin:0; font-family:var(--font); color:var(--ink); overflow:hidden; background:var(--bg);
    background-image:
      repeating-linear-gradient(60deg, rgba(156,93,105,.045) 0 1px, transparent 1px 22px),
      repeating-linear-gradient(-60deg, rgba(156,93,105,.045) 0 1px, transparent 1px 22px),
      repeating-linear-gradient(0deg, rgba(156,93,105,.035) 0 1px, transparent 1px 22px);
    -webkit-font-smoothing:antialiased; }
  button{ font-family:inherit; color:inherit; cursor:pointer; }
  a{ color:inherit; text-decoration:none; }
  svg{ display:block; }
  .ico{ width:22px; height:22px; }
  .app{ height:100dvh; display:grid; grid-template-rows:auto auto 1fr auto; }

  /* TOP BAR */
  .topbar{ display:flex; align-items:center; gap:13px; padding:11px 16px; background:var(--surface); border-bottom:1px solid var(--line); position:relative; z-index:30; }
  .brand{ display:flex; align-items:center; gap:11px; min-width:0; flex:1 1 auto; }
  .logo{ display:inline-flex; align-items:center; justify-content:center; height:38px; padding:0 13px; border-radius:var(--radius-s); background:linear-gradient(140deg,var(--rose),var(--rose-deep)); color:#fff; font-family:var(--font-head); font-weight:700; letter-spacing:.16em; font-size:15px; text-indent:.14em; box-shadow:var(--shadow-s); flex:0 0 auto; transition:.2s var(--ease); }
  .logo:hover{ transform:translateY(-1px); }
  .ctx{ display:flex; flex-direction:column; gap:1px; min-width:0; }
  .ctx .a{ font-size:11px; letter-spacing:.14em; color:var(--rose-deep); font-weight:700; }
  .ctx .b{ font-size:11px; letter-spacing:.05em; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .switch{ display:inline-flex; align-items:center; gap:10px; padding:7px 14px 7px 9px; border:1px solid var(--line); border-radius:99px; background:var(--surface-2); transition:.22s var(--ease); flex:0 0 auto; }
  .switch:hover{ border-color:var(--rose); }
  .sw-track{ position:relative; width:42px; height:24px; border-radius:99px; background:var(--faint); transition:background .28s var(--ease); flex:0 0 auto; }
  .sw-knob{ position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:#fff; box-shadow:0 2px 5px rgba(0,0,0,.22); transition:transform .3s var(--ease-out); }
  .switch.on .sw-track{ background:linear-gradient(140deg,var(--rose),var(--rose-deep)); }
  .switch.on .sw-knob{ transform:translateX(18px); }
  .sw-label{ font-size:12.5px; font-weight:700; letter-spacing:.05em; color:var(--ink-soft); white-space:nowrap; }
  .switch.on .sw-label{ color:var(--rose-deep); }
  .ham{ display:inline-flex; align-items:center; justify-content:center; width:42px; height:42px; border:1px solid var(--line); border-radius:var(--radius-s); background:var(--surface-2); color:var(--ink); transition:.22s var(--ease); flex:0 0 auto; }
  .ham:hover{ border-color:var(--rose); color:var(--rose-deep); }

  /* PROGRESS */
  .progress{ display:flex; align-items:center; gap:13px; padding:9px 16px; background:var(--surface-2); border-bottom:1px solid var(--line); position:relative; z-index:20; }
  .phases{ display:flex; gap:7px; flex:0 0 auto; }
  .phase{ display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:99px; padding:5px 12px; background:transparent; font-size:11.5px; letter-spacing:.05em; color:var(--ink-soft); font-weight:700; white-space:nowrap; transition:.22s var(--ease); }
  .phase .ti{ width:14px; height:14px; }
  .phase:hover{ border-color:var(--rose); color:var(--rose-deep); }
  .phase.on{ background:var(--rose); border-color:var(--rose); color:#fff; }
  .pbar{ flex:1 1 auto; height:6px; border-radius:99px; background:var(--rose-soft); overflow:hidden; min-width:50px; }
  .pbar i{ display:block; height:100%; width:0; border-radius:99px; background:linear-gradient(90deg,var(--rose),var(--rose-deep)); transition:width .5s var(--ease-out); }
  .pcount{ flex:0 0 auto; font-size:12px; color:var(--ink-soft); white-space:nowrap; font-weight:700; }
  .pcount b{ color:var(--rose-deep); font-size:1.3em; font-family:var(--font-head); }

  /* BODY */
  .body{ position:relative; min-height:0; display:grid; grid-template-columns:1fr var(--dw); transition:grid-template-columns .44s var(--ease); }
  .body.closed{ grid-template-columns:1fr 0px; }
  .stage{ position:relative; min-width:0; min-height:0; display:flex; align-items:center; justify-content:center; padding:20px; }
  /* フレームは JS で画像比(1600:912)にフィット。余白・はみ出しゼロ。 */
  .imgframe{ position:relative; border-radius:var(--radius); overflow:hidden; background:var(--stage-bg); border:1px solid var(--line); box-shadow:var(--shadow); }
  .imgframe .layer{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .55s var(--ease); will-change:opacity; }
  .imgframe .layer.show{ opacity:1; }

  /* DRAWER */
  .drawer{ position:relative; min-width:0; min-height:0; overflow:hidden; background:var(--surface); border-left:1px solid var(--line); box-shadow:-12px 0 30px rgba(80,45,55,.06); }
  .body.closed .drawer{ opacity:0; }
  .drawer .scroll{ position:absolute; inset:0; overflow-y:auto; scrollbar-width:thin; display:flex; flex-direction:column; }
  .drawer .scroll::-webkit-scrollbar{ width:7px; } .drawer .scroll::-webkit-scrollbar-thumb{ background:var(--rose-soft); border-radius:6px; }
  .d-head{ flex:0 0 auto; padding:18px 20px 0; }
  .kicker{ display:inline-block; font-size:10.5px; letter-spacing:.14em; font-weight:800; color:#fff; background:var(--rose); border-radius:99px; padding:3px 11px; }
  .d-te{ font-size:11.5px; letter-spacing:.1em; color:var(--rose-deep); font-weight:700; margin:12px 0 3px; }
  .d-title{ font-family:var(--font-head); font-size:22px; font-weight:700; letter-spacing:.04em; margin:0; line-height:1.35; }
  .d-body{ flex:1 1 auto; display:flex; flex-direction:column; padding:14px 20px 0; }
  .d-text{ font-size:14.5px; line-height:2.0; letter-spacing:.02em; margin:0 0 14px; }
  .d-text b{ color:var(--rose-deep); font-weight:700; }
  .tools{ display:flex; flex-wrap:wrap; gap:7px; margin:0 0 16px; }
  .tool{ display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--ink); background:var(--chip-bg); border-radius:99px; padding:5px 11px 5px 9px; font-weight:600; }
  .tool .ti{ width:16px; height:16px; color:var(--rose-deep); }
  .onna{ font-size:12.5px; line-height:1.7; color:var(--ink-soft); background:var(--rose-soft); border-radius:var(--radius-s); padding:9px 12px; margin:0 0 14px; border-left:3px solid var(--rose); }
  .onna::before{ content:"女点前のポイント"; display:block; font-size:10px; letter-spacing:.1em; color:var(--rose-deep); font-weight:800; margin-bottom:3px; }

  /* 下部ゾーン：稽古の心得（先生の顔つき）＋ 豆知識 */
  .bottom-zone{ margin-top:auto; padding:16px 18px 20px; }
  .kokoroe{ display:block; background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius-s); padding:13px 15px; margin-bottom:13px; }
  .kokoroe .head{ display:flex; align-items:center; gap:9px; margin-bottom:9px; }
  .sensei-face{ flex:0 0 auto; width:40px; height:40px; border-radius:50%; overflow:hidden; position:relative; background:radial-gradient(120% 120% at 40% 30%, #fff, var(--rose-soft)); border:2px solid var(--surface); box-shadow:0 3px 9px rgba(80,45,55,.18), 0 0 0 1px var(--line); }
  .sensei-face img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:52% 20%; }
  .sensei-face svg{ position:absolute; inset:0; width:100%; height:100%; }
  .kokoroe .h{ display:flex; align-items:center; gap:7px; font-size:11.5px; letter-spacing:.1em; color:var(--rose-deep); font-weight:800; margin:0; }
  .kokoroe .h::before{ content:""; width:5px; height:15px; border-radius:2px; background:var(--rose); }
  .kokoroe p{ margin:0; font-size:13.5px; line-height:1.95; color:var(--ink); }
  .tip-h{ display:flex; align-items:center; gap:8px; font-size:11.5px; font-weight:800; letter-spacing:.06em; color:var(--rose-deep); margin-bottom:8px; }
  .tip-h .ico{ width:16px; height:16px; }
  .tip-card{ background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius-s); padding:12px 13px; }
  .tip-cat{ display:inline-block; font-size:9.5px; letter-spacing:.1em; font-weight:800; color:var(--rose-deep); background:var(--rose-soft); border-radius:99px; padding:2px 9px; margin-bottom:6px; }
  .tip-tt{ font-family:var(--font-head); font-size:14px; font-weight:700; margin-bottom:4px; }
  .tip-tx{ font-size:12.5px; line-height:1.8; color:var(--ink-soft); }

  @keyframes enterUp{ from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:none;} }
  .anim .d-head, .anim .d-body{ animation:enterUp .42s var(--ease-out) both; }
  .anim .d-body{ animation-delay:.05s; }

  /* FOOTER */
  .footer{ display:flex; align-items:center; gap:12px; padding:11px 16px; background:var(--surface); border-top:1px solid var(--line); position:relative; z-index:20; }
  .navbtn{ display:inline-flex; align-items:center; gap:9px; padding:12px 20px; border:1px solid var(--line); border-radius:99px; background:var(--surface-2); color:var(--ink); font-size:14px; font-weight:700; letter-spacing:.06em; transition:.22s var(--ease); flex:0 0 auto; }
  .navbtn:hover:not(:disabled){ border-color:var(--rose); color:var(--rose-deep); transform:translateY(-2px); box-shadow:var(--shadow-s); }
  .navbtn.next{ background:linear-gradient(140deg,var(--rose),var(--rose-deep)); color:#fff; border-color:transparent; box-shadow:var(--shadow-s); }
  .navbtn:disabled{ opacity:.32; cursor:not-allowed; }
  .navbtn .ico{ width:18px; height:18px; }
  .foot-mid{ flex:1 1 auto; text-align:center; min-width:0; }
  .foot-mid .t{ font-family:var(--font-head); font-size:15px; font-weight:700; letter-spacing:.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .foot-mid .s{ font-size:11px; color:var(--ink-soft); letter-spacing:.06em; }

  /* MENU（右） */
  .scrim{ position:fixed; inset:0; background:rgba(30,20,24,.42); opacity:0; pointer-events:none; transition:.28s var(--ease); z-index:40; }
  .scrim.show{ opacity:1; pointer-events:auto; }
  .menu{ position:fixed; top:0; right:0; bottom:0; width:330px; max-width:88vw; z-index:50; background:var(--surface); border-left:1px solid var(--line); box-shadow:var(--shadow); transform:translateX(104%); transition:transform .34s var(--ease-out); display:flex; flex-direction:column; }
  .menu.show{ transform:none; }
  .menu-h{ padding:16px 16px 8px; border-bottom:1px solid var(--line); }
  .menu-h h2{ font-family:var(--font-head); font-size:16px; margin:2px; letter-spacing:.06em; }
  .menu-h p{ font-size:11px; color:var(--ink-soft); margin:4px 2px 0; }
  .menu-scroll{ flex:1 1 auto; overflow-y:auto; padding:10px 12px 16px; scrollbar-width:thin; }
  .nav-phase{ font-size:10.5px; letter-spacing:.1em; color:var(--faint); font-weight:800; margin:12px 2px 5px; }
  .nav-item{ display:flex; gap:9px; align-items:center; width:100%; text-align:left; background:transparent; border:0; border-radius:var(--radius-s); padding:8px 9px; font-size:12.5px; color:var(--ink-soft); transition:.16s var(--ease); }
  .nav-item:hover{ background:var(--surface-2); color:var(--ink); }
  .nav-item .num{ flex:0 0 auto; width:23px; height:23px; border-radius:50%; border:1px solid var(--line); display:inline-flex; align-items:center; justify-content:center; font-size:10.5px; font-weight:700; }
  .nav-item.cur{ background:var(--rose-soft); color:var(--rose-deep); font-weight:700; }
  .nav-item.cur .num{ background:var(--rose); border-color:var(--rose); color:#fff; }
  .nav-item.done .num{ background:var(--chip-bg); }

  /* ≤820px：縦積み（画像が上・解説が下）。本来のレスポンシブ。 */
  @media (max-width:820px){
    .body{ grid-template-columns:1fr; grid-template-rows:auto 1fr; transition:grid-template-rows .4s var(--ease); }
    .body.closed{ grid-template-columns:1fr; grid-template-rows:auto 0px; }
    .stage{ align-items:flex-start; padding:14px 14px 6px; }
    .imgframe{ width:100%!important; height:auto!important; aspect-ratio:1600/912; }
    .drawer{ border-left:0; border-top:1px solid var(--line); box-shadow:0 -8px 22px rgba(80,45,55,.05); }
    .ctx .b{ display:none; } .navbtn{ padding:11px 15px; font-size:13px; }
  }
  @media (max-width:560px){
    .topbar{ gap:9px; padding:10px 12px; }
    .logo{ height:34px; padding:0 11px; font-size:14px; }
    .switch{ padding:6px; gap:0; } .switch .sw-label{ display:none; }
    .progress{ gap:9px; padding:8px 12px; flex-wrap:wrap; }
    .pcount{ font-size:11px; }
    .footer{ gap:8px; padding:10px 12px; } .navbtn{ padding:10px 13px; font-size:12.5px; }
    .foot-mid .t{ font-size:13.5px; }
  }
  @media (max-width:480px){ .stage{ padding:12px; } .phases .phase{ padding:5px 9px; } }
  @media (prefers-reduced-motion:reduce){ *{ transition:none !important; animation:none !important; } }
</style>
</head>

<nav class="menu" id="menu" aria-label="全ての手">
  <div class="menu-h"><h2>全ての手から選ぶ</h2><p>全 <span id="menuTotal">51</span> 手・三段（清め／点て／仕舞い）</p></div>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <a class="logo" href="temae-cover.html" aria-label="表紙へ戻る">茶の湯</a>
      <div class="ctx"><span class="a" id="ctxA">表千家・女点前</span><span class="b" id="ctxB">風炉（夏）／薄茶／運び点前</span></div>
    </div>
    <button class="switch on" id="toggleBtn" type="button" role="switch" aria-checked="true" aria-label="解説の表示・非表示">
      <span class="sw-track"><span class="sw-knob"></span></span><span class="sw-label">解説 <b id="swState">ON</b></span>
    </button>
    <button class="ham" id="hamBtn" type="button" aria-label="全ての手のメニューを開く"><svg class="ico"><use href="#i-ham"/></svg></button>
  </header>

  <div class="progress">
    <div class="phases" id="phases"></div>
    <div class="pbar"><i id="pbarFill"></i></div>
    <div class="pcount">第 <b id="pcur">1</b> 手 ／ 全 <span id="ptot">51</span> 手</div>
  </div>

  <div class="body" id="bodyGrid">
    <section class="stage" id="stage" aria-label="お点前の様子">
      <div class="imgframe" id="imgframe">
        <img class="layer" id="imgA" alt="">
        <img class="layer" id="imgB" alt="">
      </div>
    </section>

    <aside class="drawer" id="drawer" aria-label="解説と豆知識">
      <div class="scroll" id="drawerScroll">
        <div class="d-head">
          <span class="kicker" id="ePhase">① 清め</span>
          <div class="d-te" id="eTe">運び出し</div>
          <h2 class="d-title" id="eTitle">初座（風炉と釜）</h2>
        </div>
        <div class="d-body">

  /* 各手に固有の豆知識を割り当て（全51手すべて別。tidbits.js のタイトルで参照） */
  const STEP_TIP = {
    1:"風炉は夏の設え", 2:"水指と釜の役割", 3:"運び点前は基本の形", 4:"建水は水こぼし", 5:"蓋置は釜蓋・柄杓の留め",

  PHASES.forEach(p => {
    const h=document.createElement('div'); h.className='nav-phase'; h.textContent=p.label+'　'+(p.sub||''); navList.appendChild(h);

      b.addEventListener('click', () => { goTo(i); openMenu(false); });
      navList.appendChild(b);
    });
  });

  const TIP_BY_TITLE={}; TID.forEach(t=>{ TIP_BY_TITLE[t.title]=t; });
  function tipFor(n){ return TIP_BY_TITLE[STEP_TIP[n]] || TID[(n-1)%(TID.length||1)] || null; }

  /* フレームを画像比にフィット（はみ出し・余白ゼロ） */
  function fitFrame(){
    const cs=getComputedStyle(stage);
    const aw=stage.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
    const ah=stage.clientHeight - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
    if(aw<=0||ah<=0) return;
    let w=aw, h=w/AR; if(h>ah){ h=ah; w=h*AR; }
    frame.style.width=Math.round(w)+'px'; frame.style.height=Math.round(h)+'px';
  }
  function animateFit(dur){ const t0=performance.now(); (function loop(t){ fitFrame(); if(t-t0<dur) requestAnimationFrame(loop); })(performance.now()); }
  window.addEventListener('resize', fitFrame);
  grid.addEventListener('transitionend', e=>{ if(e.propertyName==='grid-template-columns') fitFrame(); });

  /* 画像クロスフェード（フェードのみ） */
  const imgA=$('imgA'), imgB=$('imgB'); let front=imgA, back=imgB;

    const apply=()=>{ back.src=src; back.alt=alt||''; back.classList.add('show'); front.classList.remove('show'); const t=front; front=back; back=t; };
    pre.onload=apply; pre.onerror=apply; pre.src=src;
  }

  const drawerScroll=$('drawerScroll');
  function replay(){ drawerScroll.classList.remove('anim'); void drawerScroll.offsetWidth; drawerScroll.classList.add('anim'); }

  function render(){
    const s=STEPS[cur]; if(!s) return;
    const p=phaseById[s.phase]||{label:''};
    showImage(s.img, s.title);
    $('ePhase').textContent=p.label; $('eTe').textContent=s.te||''; $('eTitle').textContent=s.title;
    $('eText').innerHTML = ENRICH[s.n] || s.text || '';
    $('ePoint').textContent = KOKOROE[s.n] || '';
    const onna=$('eOnna'); if(s.onna){ onna.style.display=''; onna.textContent=s.onna; } else onna.style.display='none';
    const tools=$('eTools'); tools.innerHTML='';
    (s.tools||[]).forEach(t=>{ const c=document.createElement('span'); c.className='tool';
      const id=TOOL_ICON[t]; c.innerHTML=(id?'<svg class="ti"><use href="#tt-'+id+'"/></svg>':'')+t; tools.appendChild(c); });
    const td=tipFor(s.n);
    if(td){ $('tipCat').textContent=td.category||'豆知識'; $('tipTt').textContent=td.title||''; $('tipTx').textContent=td.text||''; }
    $('footT').textContent=s.title; $('footS').textContent=p.label+(s.te?' ・ '+s.te:'');

    $('pcur').textContent=s.n;
    $('pbarFill').style.width=(TOTAL?((cur+1)/TOTAL*100):0)+'%';
    Array.from(phasesWrap.children).forEach(b=>b.classList.toggle('on', b.dataset.pid===s.phase));
    Array.from(navList.querySelectorAll('.nav-item')).forEach(b=>{ const i=+b.dataset.idx; b.classList.toggle('cur',i===cur); b.classList.toggle('done',i<cur); });
    $('prevBtn').disabled=cur===0; $('nextBtn').disabled=cur===TOTAL-1;
    drawerScroll.scrollTop=0; replay();
  }

  function goTo(i){ i=Math.max(0,Math.min(TOTAL-1,i)); cur=i; render(); }
  function next(){ if(cur<TOTAL-1) goTo(cur+1); }
  function prev(){ if(cur>0) goTo(cur-1); }

  function setOpen(o){
    open=o; grid.classList.toggle('closed', !o);
    const t=$('toggleBtn'); t.classList.toggle('on', o); t.setAttribute('aria-checked', String(o));
    $('swState').textContent = o ? 'ON' : 'OFF';
    animateFit(480);   // 開閉でステージ幅が変わるのでフィットし直す
  }
  $('toggleBtn').addEventListener('click', () => setOpen(!open));

  const menu=$('menu'), scrim=$('scrim');
  function openMenu(o){ menu.classList.toggle('show',o); scrim.classList.toggle('show',o); }
  $('hamBtn').addEventListener('click', () => openMenu(true));
  scrim.addEventListener('click', () => openMenu(false));

  document.addEventListener('keydown', e=>{
    if(e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
    if(e.key==='ArrowRight'){ e.preventDefault(); next(); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); prev(); }
    else if(e.key==='Escape'){ openMenu(false); }
  });
  $('prevBtn').addEventListener('click', prev);
  $('nextBtn').addEventListener('click', next);

  render();
  fitFrame();
  window.addEventListener('load', fitFrame);
})();
</script>
</body>
</html>
